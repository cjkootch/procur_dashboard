# Fly deploy config for procur-voice-bridge per
# docs/vex-into-procur-merge-brief.md Phase 7.5.
#
# Deploy with:
#   cd services/voice-bridge
#   fly deploy --remote-only
#
# Required Fly secrets (set via `fly secrets set -a procur-voice-bridge`):
#   OPENAI_API_KEY     — Realtime API access
#   DATABASE_URL       — same Neon URL as the main app (cost ledger writes)
#
# Fly machine: 1x shared-cpu-1x with 256MB RAM is enough for v1
# (single-call concurrency is the typical case for solo-operator
# scope; Realtime API does the heavy lifting).

app = "procur-voice-bridge"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3030"
  HOST = "0.0.0.0"
  NODE_ENV = "production"

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
